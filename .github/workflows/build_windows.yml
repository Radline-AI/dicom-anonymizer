name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pydicom gooey six pyinstaller
          pip install colored==1.4.4

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "DICOM-Anonymizer" --collect-data gooey --hidden-import=six anonymize_dicom.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DICOM-Anonymizer-Windows
          path: dist/DICOM-Anonymizer.exe